[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["*Test", "Test*"]
python_functions = ["test_*"]

[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
    ".git",
    ".tui",
    ".venv",
    "data",
    "external",
    "outputs",
    "scripts/download-data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",
]

[tool.ruff.format]
line-ending = "lf"
